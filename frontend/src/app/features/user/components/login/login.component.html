<div class="auth-wrapper">
  <div class="auth-card glass-panel">
    <h2>Welcome Back</h2>
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <p class="switch-link">Don't have an account? <a routerLink="/user/register">Register</a></p>
  </div>
</div>
