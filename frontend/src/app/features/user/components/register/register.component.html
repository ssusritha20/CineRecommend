<div class="auth-wrapper">
  <div class="auth-card glass-panel">
    <h2>Create Account</h2>
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="userData.username" name="username" required minlength="3" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="userData.email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="userData.password" name="password" required minlength="6" placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>
    <p class="switch-link">Already have an account? <a routerLink="/user/login">Login instead</a></p>
  </div>
</div>
