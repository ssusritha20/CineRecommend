<div class="movie-card glass-panel" [routerLink]="['/movies', movie._id]">
  <div class="poster-container">
    <div class="poster-overlay">
      <div class="play-icon-overlay">
        <span class="play-icon">▶</span>
      </div>
    </div>
    <img [src]="movie.posterUrl || 'https://via.placeholder.com/300x450?text=No+Poster'" alt="{{ movie.title }}">
    <button class="favorite-btn glass-panel" [class.active]="isFavorite" (click)="onToggleFavorite($event)">
      <span class="heart">{{ isFavorite ? '♥' : '♡' }}</span>
    </button>
    <div class="rating-badge glass-panel">
      <span class="star">★</span> {{ movie.averageRating?.toFixed(1) || 'N/A' }}
    </div>
  </div>
  <div class="movie-info">
    <h3 class="movie-title">{{ movie.title }} <span class="year">({{ movie.releaseYear }})</span></h3>
    <p class="genres">{{ movie.genres?.join(', ') }}</p>
  </div>
</div>
